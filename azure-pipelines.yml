# ==========================================
# 企業級 DevSecOps 自動化管線 (CI/CD)
# ==========================================
# 觸發規則：當 main 或 develop 分支有代碼更動時啟動
trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 基礎變數設定
  awsRegion: 'ap-northeast-1'
  ecrRepository: 'ecommerce-demo'
  imageName: '$(ecrRepository):$(Build.BuildId)'
  terraformWorkingDir: '$(System.DefaultWorkingDirectory)'
  k8sDir: '$(System.DefaultWorkingDirectory)/k8s'

stages:
  # ==========================================
  # 第一關：【Analysis】靜態代碼與 IaC 安全掃描 (資安左移)
  # ==========================================
  - stage: Analysis
    displayName: '1. 安全與合規掃描'
    jobs:
      - job: IaC_Scan
        displayName: 'Checkov IaC 安全檢查'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
          - script: |
              pip install checkov
              # 掃描 Terraform 檔案，查找是否有開放危險的 Security Group (如 0.0.0.0/0)
              checkov -d . --soft-fail
            displayName: '執行 Checkov 掃描'

      - job: K8s_Lint
        displayName: 'Kube-linter 規範檢查'
        steps:
          - script: |
              # 檢查 Kubernetes Manifests 是否符合生產環境規範 (如 Resource Limit 是否設定)
              curl -sL https://github.com/kube-linter/kube-linter/releases/latest/download/kube-linter-linux.tar.gz | tar -xz
              ./kube-linter lint $(k8sDir)
            displayName: '執行 Kube-linter 驗證'

  # ==========================================
  # 第二關：【Testing】自動化測試 (系統穩定性)
  # ==========================================
  - stage: Testing
    displayName: '2. 穩定性與效能測試'
    dependsOn: Analysis
    jobs:
      - job: Unit_Test
        displayName: '單元測試'
        steps:
          - script: |
              echo "Executing Python Pytest..."
            displayName: 'Pytest'
      
      - job: Load_Test
        displayName: 'K6 負載驗證'
        steps:
          - script: |
              echo "模擬併發流量測試，確保系統負載能力..."
            displayName: '執行 K6 壓力測試'

  # ==========================================
  # 第三關：【Build】構建與映像檔漏洞掃描
  # ==========================================
  - stage: Build
    displayName: '3. 構建與映像檔掃描'
    dependsOn: Testing
    jobs:
      - job: BuildAndScan
        displayName: 'Docker Build & Trivy Check'
        steps:
          - task: Docker@2
            displayName: '打包 Docker 映像檔'
            inputs:
              command: 'build'
              repository: '$(ecrRepository)'
              Dockerfile: '**/Dockerfile'
              tags: '$(Build.BuildId)'

          - script: |
              # 使用 Trivy 掃描 Docker Image 內的 OS 漏洞
              # 若發現 CRITICAL (一級) 漏洞，直接中斷 Pipeline 阻止發佈
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy image --severity HIGH,CRITICAL --no-progress $(imageName)
            displayName: '執行 Trivy 資安掃描'

  # ==========================================
  # 第四關：【Deploy】GitOps 聲明式發佈 (低風險交付)
  # ==========================================
  - stage: Deploy
    displayName: '4. 佈署至 AWS EKS'
    dependsOn: Build
    # 僅在 main 分支變更且前面關卡全過時執行
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Argo_Rollouts
        displayName: '更新 ArgoCD 狀態'
        steps:
          - script: |
              echo "更新 K8s Manifest 至新版本: $(Build.BuildId)"
              # 實際行為：會更新 git 庫中的 image tag，進而觸發 Argo Rollouts 發佈
            displayName: '觸發 GitOps 更新'

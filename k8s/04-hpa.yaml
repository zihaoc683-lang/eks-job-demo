apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecommerce-hpa
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: ecommerce-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30  # 門檻調低到 30%，保證壓測一開立馬有反應
  
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # 壓力一來，不等待，立刻擴容
      policies:
      - type: Pods
        value: 4               # 展示效果：一次長出 4 個 Pod，視覺衝擊感更強
        periodSeconds: 10      # 每 10 秒評估一次
      selectPolicy: Max
    
    scaleDown:
      # 重要！Demo 必備：壓力一停，30 秒內就開始縮容，方便你展示第二次 Demo
      stabilizationWindowSeconds: 30 
      policies:
      - type: Percent
        value: 100             # 縮容時不手軟，直接縮到 targetReplicas
        periodSeconds: 15

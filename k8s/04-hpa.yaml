# 04-hpa.yaml
# =========================================================================
# 水平自動擴縮 (Horizontal Pod Autoscaler)
# =========================================================================
# 監控 CPU 使用率，超過門檻時自動增加 Pod 數量；壓力解除後自動縮回
# =========================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecommerce-hpa
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: ecommerce-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30  # CPU 超過 30% 即觸發擴容，門檻調低確保壓測時有明顯反應

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0  # 壓力一來立即擴容，不設冷卻等待
      policies:
      - type: Pods
        value: 4          # 每次最多新增 4 個 Pod，視覺效果明顯
        periodSeconds: 10
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 30  # 壓力消失後等待 30 秒再縮容，避免頻繁震盪
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
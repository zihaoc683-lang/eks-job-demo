# 03-bad-pod.yaml
# 這個 Pod 刻意違反安全規則，用於展示 Kyverno 的攔截能力
# 預期結果：kubectl apply 後應被 Kyverno 拒絕，Pod 不會被建立

apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-security-violation
spec:
  containers:
  - name: bad-pod
    image: alpine
    command: ["sleep", "3600"]
    securityContext:
      privileged: true  # ⚠️ 違規點：取得宿主機 root 權限，極度危險
                        # Kyverno 的 validate-privileged 規則會在此攔截
# =========================================================================
# 金融級機密管理：External Secrets Operator (Zero-Trust Secrets)
# =========================================================================
# 說明：金管會規定，敏感資料 (如 DB 密碼) 不得在 Git 儲存庫以明文或 Base64 存放。
# 正確的做法是將機密存放於「AWS Secrets Manager」，並由 Operator 自動同步。
# 
# 此宣告檔展示了如何將 AWS 端的「prod/db/password」安全地「投影」進 K8s 內部。
# 面試亮點：研發人員完全接觸不到密碼，只有應用程式 Pod 能讀取。
# =========================================================================

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-store
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-1
      auth:
        jwt: # 使用 IRSA (IAM Roles for Service Accounts) 進行無密鑰授權
          serviceAccountRef:
            name: secrets-sync-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ecommerce-db-credentials
  namespace: default
spec:
  refreshInterval: 1h             # 密碼每小時自動與 AWS 同步一次 (實現自動輪轉)
  secretStoreRef:
    name: aws-secretsmanager-store
    kind: SecretStore
  target:
    name: db-pass-k8s-secret     # 在 K8s 內產生的 Secret 名稱
    creationPolicy: Owner
  data:
  - secretKey: database-password
    remoteRef:
      key: prod/ecommerce/db     # AWS Secrets Manager 中的路徑
      property: password

# =========================================================================
# 企業級資源治理：Resource Quota & LimitRange (Multi-tenancy Governance)
# =========================================================================
# 說明：在金融業，K8s 叢集通常是多個部門共享。
# 如果沒有限制，一個有 Bug 的 Pod 可能會耗盡整台主機資源，導致其他核心業務故障。
# 
# 本配置定義了「default」命名空間的總資源配額，以及單一容器的預設請求量，
# 確保「帳務系統」不會被「促銷活動系統」拖垮。
# =========================================================================

apiVersion: v1
kind: ResourceQuota
metadata:
  name: ecommerce-resource-quota
  namespace: default
spec:
  hard:
    requests.cpu: "4"      # 該命名空間所有 Pod 請求的總 CPU
    requests.memory: 8Gi   # 該命名空間所有 Pod 請求的總內存
    limits.cpu: "8"        # 限制最高總 CPU
    limits.memory: 16Gi    # 限制最高總內存
    pods: "20"             # 限制 Pod 總數，防止 Fork Bomb 攻擊
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ecommerce-default-limits
  namespace: default
spec:
  limits:
  - default:                # 如果開發者沒寫 Limit，系統自動加上這個
      cpu: 500m
      memory: 512Mi
    defaultRequest:         # 如果開發者沒寫 Request，系統自動加上這個
      cpu: 100m
      memory: 256Mi
    max:                    # 禁止單一 Pod 佔用過大資源
      cpu: "1"
      memory: 1Gi
    type: Container

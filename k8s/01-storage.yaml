# 01-storage.yaml
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
# 延遲綁定：等到 Pod 確定落在哪個節點，才在同一個 AZ 建立實體硬碟
# 避免硬碟建在 AZ-A 但 Pod 跑到 AZ-B 導致永遠無法掛載
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  storageClassName: ebs-sc  # 使用上方定義的 StorageClass，向 AWS 自動申請 EBS 硬碟
  accessModes:
    - ReadWriteOnce           # 同時間只允許一個節點掛載，適合資料庫等需要獨佔 IOPS 的場景
  resources:
    requests:
      storage: 5Gi
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
# 設定為：等到有人要求掛載，才真正去 AWS 生出實體硬碟 (省錢防呆機制)
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  # 透過 ebs-sc 這個 StorageClass，自動跟 AWS 索取一塊實體的雲端硬碟 (EBS)
  storageClassName: ebs-sc
  
  # ReadWriteOnce 代表這顆硬碟同時間只能插在「一台」實體機器上運作
  accessModes:
    - ReadWriteOnce
    
  # 我們只要跟 AWS 拿小小的一塊 5GB 就夠用了
  resources:
    requests:
      storage: 5Gi

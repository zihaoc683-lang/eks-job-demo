# 03-service.yaml
# =========================================================================
# 對外服務入口 (Network Load Balancer)
# =========================================================================
# 建立後 AWS 會自動生成一個 NLB，提供固定的對外網址
# 注意：刪除此 Service 時，AWS 的 NLB 也會一併被回收
# =========================================================================

apiVersion: v1
kind: Service
metadata:
  name: ecommerce-svc
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"  # 指定使用 NLB 而非舊版 CLB
spec:
  type: LoadBalancer  # 觸發 AWS 建立實體負載均衡器
  ports:
  - port: 80          # 對外開放 80 Port
    targetPort: 9898  # 轉發至 Pod 內部的 9898 Port
  selector:
    app: ecommerce-backend  # 將流量均分給所有帶有此標籤的 Pod
# =========================================================================
# Layer 7 流量控管與 SSL 終端：Ingress Controller
# =========================================================================
# 說明：針對網訊電通、TVBS 等要求的 Nginx/ALB 配置能力。
# 透過 Ingress，我們可以透過單一外部入口管理多個微服務，並實作域名路由與 SSL 卸載。
# =========================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: default
  annotations:
    # 告訴 EKS 使用 AWS Load Balancer Controller 來建立 ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # SSL 配置：展現您懂得金融級加密
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-1:xxxxxx # 實務上會掛載 ACM 憑證
    
    # 健康檢查優化
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  rules:
  - host: shop.demo-project.com # 展現對 DNS/虛擬主機的概念
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: ecommerce-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-frontend-svc # 模擬路由到不同服務
            port:
              number: 80

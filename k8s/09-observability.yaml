# 09-observability.yaml
# =========================================================================
# 可觀測性堆疊 (Observability Stack)
# =========================================================================
# 透過 Argo CD 以 GitOps 方式管理 Prometheus + Grafana
# 實現「監控即代碼 (Observability as Code)」
# =========================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 58.2.1  # 鎖定版本，避免 Chart 自動更新造成非預期錯誤
    helm:
      parameters:
        - name: grafana.adminPassword
          value: "admin"      # Demo 用固定密碼，生產環境應改用 Secret
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  # monitoring namespace 不存在時自動建立
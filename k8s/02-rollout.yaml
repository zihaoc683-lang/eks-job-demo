# 02-rollout.yaml
# =========================================================================
# 金絲雀發布 (Canary Rollout)
# =========================================================================
# 新版本上線時，先只導入 20% 流量觀察，確認無誤後再手動晉升到 100%
# 有效控制「爆炸半徑 (Blast Radius)」，異常時可秒級回滾
# =========================================================================

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ecommerce-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-backend
  strategy:
    canary:
      steps:
      - setWeight: 20     # Step 1：新版本只接收 20% 流量
      - pause: {}         # Step 2：暫停等待人工確認，執行 promote 才繼續
      - setWeight: 50     # Step 3：確認無誤，放量至 50%
      - pause: { duration: 10 }
      - setWeight: 100    # Step 4：全量上線
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
      - name: backend
        image: stefanprodan/podinfo:6.2.3  # 內建圖形化介面，方便展示流量分配
        ports:
        - containerPort: 9898
        resources:
          requests:
            cpu: 50m      # 刻意設低，讓壓測時更容易觸發 HPA 擴容
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
        livenessProbe:    # K8s 定期健康檢查，失敗時自動重啟，實現自我修復
          httpGet:
            path: /healthz
            port: 9898
          initialDelaySeconds: 1
          periodSeconds: 5
# 07-kyverno-policy.yaml
# =========================================================================
# 安全政策 (Policy as Code)
# =========================================================================
# 在 API 層攔截所有不合規的資源，Pod 不會被建立而非建立後再刪除
# 規則一：禁止特權容器
# 規則二：限制映像檔來源
# =========================================================================

apiVersion: kyverno.io/v1
kind: ClusterPolicy  # 全叢集生效；若用 Policy 則只限單一 Namespace
metadata:
  name: disallow-privileged-containers
spec:
  validationFailureAction: Enforce  # Enforce = 直接拒絕；Audit = 只記錄不阻擋（測試期用）
  background: true                  # 背景掃描已存在的資源並產生合規報告
  rules:

  # 規則一：禁止特權容器
  # privileged: true 讓容器獲得宿主機 root 權限，攻擊者可藉此逃逸並控制整個 Node
  - name: validate-privileged
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system  # 系統元件 (aws-node, ebs-csi) 需要特權才能運作，必須排除
          - kyverno
    validate:
      message: "不允許建立特權容器！這違反了公司的安全基準政策。"
      foreach:
      # 用 foreach 逐一檢查每個 container，確保沒有任何一個是特權的
      - list: "request.object.spec.containers"
        deny:
          conditions:
            any:
            - key: "{{ element.securityContext.privileged || false }}"
              operator: Equals
              value: true

      # initContainers 也必須掃描
      # 攻擊者常將特權設定藏在此處繞過只掃主容器的 Policy
      - list: "request.object.spec.initContainers || `[]`"
        deny:
          conditions:
            any:
            - key: "{{ element.securityContext.privileged || false }}"
              operator: Equals
              value: true

  # 規則二：限制映像檔來源（防止供應鏈攻擊）
  - name: check-image-registry
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
    validate:
      message: "不允許使用未經授權的映像檔來源！請使用 ghcr.io 或官方來源。"
      pattern:
        spec:
          containers:
          - image: "ghcr.io/* | stefanprodan/* | alpine"
            # 只允許這三個來源，其他一律拒絕（包含 docker.io/nginx）
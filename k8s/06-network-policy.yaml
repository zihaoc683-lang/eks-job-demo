# =========================================================================
# 金融級零信任網路隔離策略 (Zero Trust Network Micro-segmentation)
# =========================================================================
# 說明：在壽險與高度合規的環境中，K8s 預設的「全網互通」是資安大忌。
# 本配置實作了兩層防禦護城河：
# 1. 預設封鎖 (Default Deny)：封鎖 Namespace 內所有非必要的連線。
# 2. 精細授權 (Granular Allow)：只有被允許的 Pod 組合才能互相通訊。
# =========================================================================

---
# 規則一：全境封鎖 (Default Deny-All)
# 作用：預設切斷 `default` namespace 中的所有 Ingress (進入) 流量。
# 面試解說：這就像是把金融大樓的內部通道全部鎖死，沒有通行證的人哪裡都去不了。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default
spec:
  podSelector: {} # 捕捉所有的 Pod
  policyTypes:
  - Ingress

---
# 規則二：後端核心系統保護 (Protect Backend/Database)
# 作用：限制核心系統 (例如帶有 backend 或資料庫標籤的 Pod)，只能接受來自合法前端 (frontend) 的連線。
# 面試解說：防止內網出現跳板攻擊 (Lateral Movement)。就算駭客攻破了某個無關緊要的工具 Pod，
# 也無法從該 Pod 直接連線掃描我的後端資料庫端口。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: ecommerce-backend # 目標：保護我們的核心電商後端
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ecommerce-frontend # 來源白名單：只有前端可以連進來
    ports:
    - protocol: TCP
      port: 8080 # 只開放特定的業務 Port，拒絕所有其他 Port 的連線

---
# 規則三：必要基礎設施放行 (Allow DNS Resolution)
# 作用：Egress 放行 UDP 53，確保叢集內部的 Service Name 能正常解析。
# 面試解說：在鎖死網路的同時，我們必須為 Kube-DNS 開設專用通道，確保服務發現不受影響。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-access
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

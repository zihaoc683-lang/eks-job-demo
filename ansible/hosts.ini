# =========================================================================
# Ansible Inventory for EKS Worker Nodes (Demo & Production Template)
# =========================================================================
# ⚠️ 演示特別說明 (Demo Note)：
# 本檔案中的所有 IP (如 10.0.1.15) 均為「模擬/佔位符 (Placeholders)」，僅作為
# 「架構展示 (Architecture Presentation)」使用，本機環境並沒有實際連線的實體機器。
# 在 Demo 現場為了加速演示與穩定性，我們使用 bin/node-fix.ps1 模擬此劇本的執行結果。
# =========================================================================
# 🛠️ 實務上通常如何操作與使用 (Standard Ansible Operations & Runbook)
#
# 在真實生產環境中，SRE/DevOps 工程師會依循以下步驟來操作與執行：
#
# 1. 取得真實節點 IP (前置作業)
#    通常我們會透過 AWS CLI 動態撈取目前 EKS 節點的 Private IP 並寫入此 INI 檔：
#    指令: aws ec2 describe-instances --filters "Name=tag:kubernetes.io/cluster/ecommerce-eks-demo,Values=shared" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text
#
# 2. 測試主機連線是否通暢 (Ad-hoc Ping 測試)
#    在執行正式劇本前，會先用 ping 模組測試與所有 EKS 節點的 SSH 通訊：
#    指令: ansible eks_nodes -m ping -i ansible/hosts.ini
#
# 3. 預檢模式 (Dry-Run / Check Mode)
#    不實際修改系統狀態，僅測試劇本邏輯是否正確、哪些步驟會發生改變：
#    指令: ansible-playbook ansible/node-hardening.yml -i ansible/hosts.ini --check
#
# 4. 正式執行安全加固劇本 (Run Playbook)
#    執行完整的系統最佳化與加固（包括更新、安裝 SRE 工具、調整 TCP 核心參數等）：
#    指令: ansible-playbook ansible/node-hardening.yml -i ansible/hosts.ini
#
# 5. 按標籤執行特定任務 (Tag Filtering)
#    若只想執行有標註 `security` 標籤的任務 (例如只做 DNF 安全更新修補 CVE)：
#    指令: ansible-playbook ansible/node-hardening.yml -i ansible/hosts.ini --tags security
# =========================================================================

# -------------------------------------------------------------------------
# 方法一：傳統 SSH 連線配置 (使用 Private IP + SSH Key)
# -------------------------------------------------------------------------
# 適用場景：運作於具備 Bastion Host (跳板機) 或內網 VPN 的環境。
# EKS 工作節點部署在私有子網中，故使用其 Private IP。
# -------------------------------------------------------------------------
[eks_nodes]
# 格式: [主機別名] ansible_host=[私有IP] ansible_user=ec2-user
eks-node-az1a-1 ansible_host=10.0.1.15
eks-node-az1a-2 ansible_host=10.0.1.123
eks-node-az1c-1 ansible_host=10.0.2.45
eks-node-az1c-2 ansible_host=10.0.2.88

[eks_nodes:vars]
# Amazon Linux 2023 預設登入使用者為 ec2-user
ansible_user=ec2-user

# 連線所使用的私鑰路徑 (請替換為您的實際金鑰路徑)
ansible_ssh_private_key_file=~/.ssh/ecommerce-eks-key.pem

# 自動忽略首次連線的 Host Key 驗證，避免 CI/CD 流程因互動式提問而卡住
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# 提權配置：EKS 節點預設 ec2-user 無 root 權限，需 become 提權執行安全加固
ansible_become=yes
ansible_become_method=sudo


# -------------------------------------------------------------------------
# 方法二：AWS SSM Session Manager 零信任連線配置 (生產環境推薦)
# -------------------------------------------------------------------------
# 適用場景：企業高安全性標準。EC2 完全不對外開放 Port 22，直接透過 AWS Systems Manager 穿透。
# 需要本地端先安裝：
#   1. AWS CLI
#   2. Session Manager Plugin
# -------------------------------------------------------------------------
# [eks_nodes_ssm]
# eks-node-az1a-1 ansible_host=i-0123456789abcdef0  # 使用 EC2 Instance ID 代替 IP
# eks-node-az1a-2 ansible_host=i-0fedcba9876543210
# 
# [eks_nodes_ssm:vars]
# ansible_user=ec2-user
# ansible_ssh_private_key_file=~/.ssh/ecommerce-eks-key.pem
# 
# # 關鍵技術：透過 AWS CLI 的 ssm start-session 作為 SSH 的 ProxyCommand 進行隧道穿透
# ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p"'

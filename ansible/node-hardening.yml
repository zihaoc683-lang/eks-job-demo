# =========================================================================
# 基礎設施維運：EKS 節點安全性加固與性能優化 (Node Hardening)
# =========================================================================
# ⚠️ 演示說明 (Demo Note)：
# 本檔案主要作為「架構展示 (Architecture Presentation)」之用，旨在展示
# 基礎設施即代碼 (IaC) 的「最終狀態」定義。在 Demo 現場為了加速演示與穩定性，
# 我們使用 bin/node-fix.ps1 模擬此劇本的執行結果。
# =========================================================================
# 技術架構說明：
# 
# 1. 組態管理 (Configuration Management)
#    - Terraform 負責雲端資源分配 (Provisioning)。
#    - Ansible 負責作業系統層級之配置管理，確保 OS 符合安全合規標準。
#    - 兩者結合實現「基礎設施即代碼 (IaC)」之完整治理。
# =========================================================================
# 2. 節點加固之必要性 (Security Hardening)
#    - 雖然 K8s 具備 Pod 隔離，但底層 Worker Node 之安全性為叢集穩定之基石。
#    - 確保作業系統層級符合合規性要求（如更新維護、時區統一與內核參數強化）。
# =========================================================================

- name: EKS Node Security Hardening & Troubleshooting Tools Setup
  hosts: eks_nodes
  become: yes # 提權為 root 執行，確保有權限修改系統核心設定
  tasks:
    # 漏洞管理 (Patch Management)：自動化修補已知作業系統漏洞。
    - name: 1. 更新系統所有套件至最新安全版本 (Patch Management)
      dnf:
        name: "*"
        state: latest
      tags: security

    # 標準化維運工具組：預裝常用診斷工具，提升事故處理效率。
    - name: 2. 安裝核心維運工具 (SRE Essential Tools)
      dnf:
        name:
          - htop      # 資源監控：快速查看 CPU/Memory 是否被異常 process 佔用
          - telnet    # 網絡連線排查：測試 port 是否有通 (網路排障基本功)
          - tcpdump   # 抓包分析：深層網路問題排查 (Packet Sniffing)
          - jq        # JSON 處理：CLI 處理 K8s API 回傳的 JSON 必備工具
          - tmux      # 終端機多工：防止斷線導致長時間運行的排障指令中斷
        state: present

    # 系統時區同步：確保日誌分析 (Log Correlation) 之時間戳一致性。
    - name: 3. 設定系統時區為 Asia/Taipei (金融/電信業審計合規要求)
      timezone:
        name: Asia/Taipei

    # 網路連線優化：調整 TCP somaxconn 以支援高併發微服務流量。
    - name: 4. 優化核心連線參數 (TCP Optimization)
      sysctl:
        name: net.core.somaxconn
        value: '1024'
        state: present
        reload: yes

    # 安全遠端存取：整合 AWS SSM Agent，實現無密鑰審計與存取管理。
    - name: 5. 確保 Amazon SSM Agent 正在運行 (現代化遠端排障基礎)
      systemd:
        name: amazon-ssm-agent
        state: started
        enabled: yes

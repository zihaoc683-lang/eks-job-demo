name: 'Terraform CI/CD (Multi-Tool Demo)'

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
  push:
    branches:
      - main
    paths:
      - '**.tf'

permissions:
  contents: read
  pull-requests: write

# =========================================================================
# IaC 穩定性與安全檢查流水線 (Terraform CI)
# =========================================================================
# 設計思維：在基礎設施變更「發生前」就攔截錯誤。
# 1. 減少環境漂移：透過 terraform plan 預覽變更。
# 2. 靜態分析：檢查 Terraform 代碼是否符合安全最佳實務。
# =========================================================================

jobs:
  terraform_analysis:
    name: 'IaC Security & Quality Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Run Checkov (Security Scan)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: true # 在 Demo 環境中顯示警告但不中斷，模擬資安分析流程

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: Update Pull Request with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌
            #### Terraform Initialization ⚙️
            #### Terraform Plan 📖
            
            <details><summary>Show Plan</summary>
            
            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.action }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

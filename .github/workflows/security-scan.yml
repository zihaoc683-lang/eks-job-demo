# =========================================================================
# 供應鏈安全檢查 (Supply Chain Security Scan)
# =========================================================================
# 定位：守護「應用層」的安全
#   - 掃描專案內所有設定檔（Terraform + Kubernetes yaml）是否含有已知設定漏洞
#   - 掃描 Container Image 是否含有已知 CVE 漏洞（OS 層 + 應用程式層）
# 分工：與 terraform-ci.yml 互補
#   - 本檔：專注「漏洞存在與否」(CVE / Misconfiguration)
#   - terraform-ci.yml：專注「基礎設施變更品質」(Plan / Format / Policy)
# 觸發：push 或 PR 到 main，無論變更哪個檔案都會觸發
# 對應職缺要求：「供應鏈安全、政策控管、映像掃描」
# =========================================================================

name: Security Scan

on:
  push:
    branches: [ main ]    # 每次 push 到 main 觸發：保護主線分支
  pull_request:
    branches: [ main ]    # 每次 PR 到 main 觸發：在合併前就完成安全審查
                          # 兩者都設定確保無論直接 push 或走 PR 流程都不漏掃

# 注意：本 workflow 未設定 permissions 區塊
# 因為只需要讀取代碼（checkout）和呼叫外部 Action
# 不需要寫入 PR Comment，故不需要 pull-requests: write
# （terraform-ci.yml 需要貼 Plan 結果到 PR，所以才需要額外權限）

jobs:
  trivy_scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        # 注意：這裡使用 v3，與 terraform-ci.yml 的 v4 不同
        # 兩者功能相同，差異僅在 Node.js runtime 版本
        # 生產環境建議統一版本避免維護混亂

      # -----------------------------------------------------------------------
      # Job 1：設定檔安全掃描 (IaC + Kubernetes Misconfiguration Scan)
      # -----------------------------------------------------------------------
      # 掃描對象：專案目錄下所有設定檔（非只有 .tf）
      # 掃描工具：Trivy config 模式（自動偵測並掃描多種設定檔格式）
      # 實際掃描範圍（依實際執行結果）：
      #   - Terraform (.tf)              → AWS 資源設定漏洞
      #     例：S3 未加密、Security Group 開放 0.0.0.0/0、未啟用 CloudTrail
      #   - Kubernetes yaml              → Pod、Service、Rollout 等安全設定
      #     例：allowPrivilegeEscalation、沒有 read-only filesystem、Image 未鎖定 digest
      #     涵蓋：k8s/ 和 demo-pods/ 目錄下所有 yaml 檔案
      #   - 注意：03-bad-pod.yaml 刻意違規（3 個 Misconfiguration）
      #     這是用於展示 Kyverno 攔截能力的測試 Pod，屬於預期行為
      # 目的：在 CI 階段提早發現設定漏洞，實現左移資安（Shift-Left Security）
      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          # config 模式：自動偵測目錄下所有支援的設定檔格式並掃描
          # 實際掃描了 Terraform (.tf) 和 Kubernetes (.yaml) 兩種格式
          # 區別於 image 模式（掃描 Container Image CVE）
          # 和 fs 模式（掃描檔案系統的依賴套件漏洞）
          hide-progress: false      # 顯示掃描進度條，方便在 CI log 中確認掃描正在進行
          format: 'table'           # 輸出格式為人類可讀的表格
                                    # 其他選項：json（機器讀取）、sarif（GitHub Security tab）
                                    # Demo 環境選 table 方便直接在 log 中展示給面試官看
          exit-code: '0'            # ⚠️ Demo 模式設定：掃描到漏洞時不中斷 Pipeline
                                    # 生產環境應設為 '1'：一旦發現 CRITICAL/HIGH 就中斷
                                    # 目前設為 0 確保 CI 永遠是綠燈，有漏洞也不阻擋 merge
                                    # 注意：03-bad-pod.yaml 的違規是預期行為，不應中斷 CI
          severity: 'CRITICAL,HIGH' # 只回報 CRITICAL 和 HIGH 等級，過濾 MEDIUM/LOW 雜訊
                                    # 生產環境可視風險容忍度調整是否納入 MEDIUM

      # -----------------------------------------------------------------------
      # Job 2：Container Image 掃描 (CVE Vulnerability Scan)
      # -----------------------------------------------------------------------
      # 掃描對象：stefanprodan/podinfo:6.2.3（場景二 Canary 演示使用的 stable 版本）
      # 掃描工具：Trivy image 模式
      # 實際掃描範圍（依實際執行結果，分層掃描整顆 Image）：
      #   - alpine 3.16.2（OS 層）        → 26 個漏洞
      #     ⚠️ 注意：alpine 3.16.2 已停止維護，不再提供安全更新
      #     漏洞偵測可能不完整，生產環境建議升級到仍受支援的版本
      #   - home/app/podinfo（Go binary） → 41 個漏洞（應用程式依賴）
      #   - usr/local/bin/podcli（Go binary） → 38 個漏洞（工具程式依賴）
      # 目的：確認實際部署的映像沒有已知的高危 CVE，模擬真實供應鏈安全檢查
      #       每次 push 都重新掃描，確保供應鏈安全持續監控
      - name: Run Trivy vulnerability scanner for Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'stefanprodan/podinfo:6.2.3'
          # 選用 podinfo:6.2.3 的原因：
          #   1. 與場景二（Canary Rollout）的 stable 版本一致，整個演示使用同一顆映像
          #   2. 公開映像，CI 不需要額外的 registry 認證設定
          #   3. 實際掃描結果（OS + Go binary）完整展示 Image 掃描的多層次能力
          format: 'table'
          exit-code: '0'            # ⚠️ Demo 模式：有漏洞不中斷
                                    # 生產環境應設為 '1'
                                    # 生產環境建議同時升級 alpine 版本解決 OS 層漏洞
          severity: 'CRITICAL,HIGH'
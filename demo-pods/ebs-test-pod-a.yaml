apiVersion: v1
kind: Pod
metadata:
  name: ebs-test-pod-a
  labels:
    app: storage-demo
spec:
  # --- 容器定義 (Application Layer) ---
  containers:
  - name: app
    image: alpine
    command: ["/bin/sh"]
    args:
    - "-c"
    - "echo '總營收一千萬' > /data/secret.txt; sleep 3600"
    
    # 磁碟掛載：將儲存資源掛載到容器內的 /data 路徑
    volumeMounts:
    - name: persistent-storage
      mountPath: /data     
      
  # --- 儲存資源定義 (Storage Layer) ---
  volumes:
  - name: persistent-storage
    # 使用 PVC 模式實作「應用程式」與「底層儲存」的解耦
    persistentVolumeClaim:
      # 指向 ebs-claim，由 CSI Driver 自動與 AWS EBS 串接
      claimName: ebs-claim

# ebs-test-pod-a.yaml
# 角色：寫入者 (Writer)
# 啟動時自動將測試資料寫入 EBS，模擬企業核心資料持久化的情境
# 依賴：ebs-claim PVC 必須已存在（demo-pods/ebs-pvc.yaml）
# 對應場景：場景四 Step 1

apiVersion: v1
kind: Pod
metadata:
  name: ebs-test-pod-a
  labels:
    app: storage-demo  # 純標記用途，方便 kubectl get pods -l app=storage-demo 篩選
                       # Pod B 刻意不設此 label，強調兩者是完全獨立的 Pod
spec:
  containers:
  - name: app
    image: alpine      # 在 Kyverno 映像白名單內，Policy 存在時不會被攔截
    command: ["/bin/sh"]
    args:
    - "-c"
    - "echo '總營收一千萬' > /data/secret.txt; sleep 3600"
    # 啟動時執行兩個動作：
    #   1. echo '總營收一千萬' > /data/secret.txt
    #      將測試資料寫入 EBS 掛載路徑，這是演示的核心寫入動作
    #   2. sleep 3600
    #      讓容器保持存活 1 小時，方便演示期間用 kubectl exec 手動驗證
    #      若不 sleep，容器寫完就結束，Pod 會進入 Completed 狀態

    volumeMounts:
    - name: persistent-storage
      mountPath: /data  # EBS 掛載進容器的路徑，echo 寫入的 secret.txt 實際存在 EBS 上

  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-claim  # 指向同名 PVC，由 EBS CSI Driver 自動串接 AWS EBS
                            # Pod B 使用完全相同的 claimName，這是跨 Pod 共享資料的關鍵
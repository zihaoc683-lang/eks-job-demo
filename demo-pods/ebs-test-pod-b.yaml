apiVersion: v1
kind: Pod
metadata:
  name: ebs-test-pod-b # Pod B 負責「驗證」：Pod A 刪掉後，EBS 上的資料是否還在
spec:
  containers:
  - name: app
    image: alpine
    command: ["/bin/sh"]
    args: ["-c", "sleep 3600"] # 只是持續存活，不寫資料 — 讓我們用 kubectl exec 手動讀取
    volumeMounts:
    - name: persistent-storage
      mountPath: /data         # 掛載同一顆 EBS，應能看到 Pod A 寫的 secret.txt
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-claim     # 與 Pod A 使用完全相同的 PVC！這是能讀到舊資料的關鍵
